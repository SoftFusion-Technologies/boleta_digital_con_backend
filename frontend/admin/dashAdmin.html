<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador - Boletas Digitales</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <svg class="school-icon" width="40" height="40" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="2"/>
                        <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2"/>
                        <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2"/>
                    </svg>
                    <h1>Boletas Digitales</h1>
                </div>
                
                <div class="user-menu">
                    <div class="user-info">
                        <span class="user-name">Admin</span>
                        <span class="user-role">Administrador</span>
                    </div>
                    <button class="btn-logout" onclick="logout()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="2"/>
                            <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2"/>
                            <path d="M21 12H9" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        Salir
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="dashboard-container">
            <!-- Welcome Section -->
            <div class="welcome-section">
                <h2> Panel de Administración</h2>
                <p class="welcome-subtitle">Gestión completa del sistema escolar</p>
            </div>

            <!-- Statistics Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M17 21V19C17 17.9391 16.5786 16.9217 15.8284 16.1716C15.0783 15.4214 14.0609 15 13 15H5C3.93913 15 2.92172 15.4214 2.17157 16.1716C1.42143 16.9217 1 17.9391 1 19V21" stroke="white" stroke-width="2"/>
                            <path d="M9 11C11.2091 11 13 9.20914 13 7C13 4.79086 11.2091 3 9 3C6.79086 3 5 4.79086 5 7C5 9.20914 6.79086 11 9 11Z" stroke="white" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <h3>1,245</h3>
                        <p>Alumnos</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="white" stroke-width="2"/>
                            <path d="M2 17L12 22L22 17" stroke="white" stroke-width="2"/>
                            <path d="M2 12L12 17L22 12" stroke="white" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <h3>14</h3>
                        <p>Cursos</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M9 11C11.2091 11 13 9.20914 13 7C13 4.79086 11.2091 3 9 3C6.79086 3 5 4.79086 5 7C5 9.20914 6.79086 11 9 11Z" stroke="white" stroke-width="2"/>
                            <path d="M12 20.5C12 18.567 10.433 17 8.5 17H8C6.34315 17 5 15.6569 5 14C5 12.3431 6.34315 11 8 11H16C17.6569 11 19 12.3431 19 14C19 15.6569 17.6569 17 16 17H15.5C13.567 17 12 18.567 12 20.5Z" stroke="white" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <h3>7</h3>
                        <p>Preceptores</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="white" stroke-width="2"/>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <h3>25</h3>
                        <p>Materias</p>
                    </div>
                </div>
            </div>

            <!-- Management Sections -->
            <div class="management-sections">
                <div class="section-card">
                    <div class="section-header">
                        <h2>👥 Gestión de Usuarios</h2>
                    </div>
                    <div class="section-body">
                        <div class="management-options">
                            <button class="manage-btn" onclick="manageUsers('alumnos')">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M17 21V19C17 17.9391 16.5786 16.9217 15.8284 16.1716C15.0783 15.4214 14.0609 15 13 15H5C3.93913 15 2.92172 15.4214 2.17157 16.1716C1.42143 16.9217 1 17.9391 1 19V21" stroke="#3b82f6" stroke-width="2"/>
                                    <path d="M9 11C11.2091 11 13 9.20914 13 7C13 4.79086 11.2091 3 9 3C6.79086 3 5 4.79086 5 7C5 9.20914 6.79086 11 9 11Z" stroke="#3b82f6" stroke-width="2"/>
                                </svg>
                                <span>Alumnos</span>
                            </button>
                            <button class="manage-btn" onclick="manageUsers('preceptores')">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M9 11C11.2091 11 13 9.20914 13 7C13 4.79086 11.2091 3 9 3C6.79086 3 5 4.79086 5 7C5 9.20914 6.79086 11 9 11Z" stroke="#10b981" stroke-width="2"/>
                                    <path d="M12 20.5C12 18.567 10.433 17 8.5 17H8C6.34315 17 5 15.6569 5 14C5 12.3431 6.34315 11 8 11H16C17.6569 11 19 12.3431 19 14C19 15.6569 17.6569 17 16 17H15.5C13.567 17 12 18.567 12 20.5Z" stroke="#10b981" stroke-width="2"/>
                                </svg>
                                <span>Preceptores</span>
                            </button>
                            <button class="manage-btn" onclick="manageUsers('admins')">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#8b5cf6" stroke-width="2"/>
                                    <path d="M2 17L12 22L22 17" stroke="#8b5cf6" stroke-width="2"/>
                                    <path d="M2 12L12 17L22 12" stroke="#8b5cf6" stroke-width="2"/>
                                </svg>
                                <span>Administradores</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="section-card">
                    <div class="section-header">
                        <h2>📚 Gestión Académica</h2>
                    </div>
                    <div class="section-body">
                        <div class="management-options">
                            <button class="manage-btn" onclick="manageCourses()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#f59e0b" stroke-width="2"/>
                                    <path d="M2 17L12 22L22 17" stroke="#f59e0b" stroke-width="2"/>
                                    <path d="M2 12L12 17L22 12" stroke="#f59e0b" stroke-width="2"/>
                                </svg>
                                <span>Cursos</span>
                            </button>
                            <button class="manage-btn" onclick="manageSubjects()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z" stroke="#ef4444" stroke-width="2"/>
                                    <path d="M14 2V8H20" stroke="#ef4444" stroke-width="2"/>
                                    <path d="M16 13H8" stroke="#ef4444" stroke-width="2"/>
                                    <path d="M16 17H8" stroke="#ef4444" stroke-width="2"/>
                                    <path d="M10 9H8" stroke="#ef4444" stroke-width="2"/>
                                </svg>
                                <span>Materias</span>
                            </button>
                            <button class="manage-btn" onclick="manageGrades()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M9 21H15C20 21 21 20 21 15V9C21 4 20 3 15 3H9C4 3 3 4 3 9V15C3 20 4 21 9 21Z" stroke="#3b82f6" stroke-width="2"/>
                                    <path d="M9 10H15" stroke="#3b82f6" stroke-width="2"/>
                                    <path d="M9 14H15" stroke="#3b82f6" stroke-width="2"/>
                                    <path d="M9 18H13" stroke="#3b82f6" stroke-width="2"/>
                                </svg>
                                <span>Calificaciones</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="section-card">
                    <div class="section-header">
                        <h2>⚙️ Configuración del Sistema</h2>
                    </div>
                    <div class="section-body">
                        <div class="management-options">
                            <button class="manage-btn" onclick="systemSettings()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M12.62 20.81C12.28 20.93 11.72 20.93 11.38 20.81C9.15 20.06 7.46 18.37 6.71 16.14C6.59 15.8 6.59 15.24 6.71 14.9L9.11 12.5L6.71 10.1C6.59 9.76 6.59 9.2 6.71 8.86C7.46 6.63 9.15 4.94 11.38 4.19C11.72 4.07 12.28 4.07 12.62 4.19C14.85 4.94 16.54 6.63 17.29 8.86C17.41 9.2 17.41 9.76 17.29 10.1L14.89 12.5L17.29 14.9C17.41 15.24 17.41 15.8 17.29 16.14C16.54 18.37 14.85 20.06 12.62 20.81Z" stroke="#6b7280" stroke-width="2"/>
                                </svg>
                                <span>Ajustes</span>
                            </button>
                            <button class="manage-btn" onclick="backupSystem()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M20 6H12L10 4H4C3.46957 4 2.96086 4.21071 2.58579 4.58579C2.21071 4.96086 2 5.46957 2 6V18C2 18.5304 2.21071 19.0391 2.58579 19.4142C2.96086 19.7893 3.46957 20 4 20H20C20.5304 20 21.0391 19.7893 21.4142 19.4142C21.7893 19.0391 22 18.5304 22 18V8C22 7.46957 21.7893 6.96086 21.4142 6.58579C21.0391 6.21071 20.5304 6 20 6Z" stroke="#10b981" stroke-width="2"/>
                                </svg>
                                <span>Backup</span>
                            </button>
                            <button class="manage-btn" onclick="viewLogs()">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#6b7280" stroke-width="2"/>
                                    <path d="M2 17L12 22L22 17" stroke="#6b7280" stroke-width="2"/>
                                    <path d="M2 12L12 17L22 12" stroke="#6b7280" stroke-width="2"/>
                                </svg>
                                <span>Logs</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
