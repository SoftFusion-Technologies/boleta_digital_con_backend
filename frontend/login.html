<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Boletas Digitales</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="../frontend/css/index.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5">
                        <!-- Logo y título -->
                        <div class="text-center mb-4">
                            <div class="bg-primary-green text rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                                <i class="logo"><img src="../frontend/img/secu1.png" alt="logo" width="70px" ></i>
                            </div>
                            <h2 class="fw-bold mb-2">Boletas Digitales</h2>
                            <p class="text-muted">Sistema de Gestión Escolar - Escuela Técnica</p>
                        </div>

                        <!-- Formulario de login -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="dni" class="form-label fw-semibold">DNI / Usuario</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-primary-green text-white">
                                        <i class="bi bi-person"></i>
                                    </span>
                                    <input type="text" class="form-control" id="dni" placeholder="Ingrese su DNI" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Contraseña</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-primary-green text-white">
                                        <i class="bi bi-lock"></i>
                                    </span>
                                    <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required>
                                </div>
                            </div>

                            <!-- Mensaje de error -->
                            <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                                <i class="bi bi-exclamation-triangle me-2"></i>
                                <span id="errorMsgText"></span>
                            </div>

                            <!-- Botón de login -->
                            <button type="submit" class="btn btn-primary-green w-100 py-3 fs-5 fw-bold">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Ingresar al Sistema
                            </button>
                        </form>

                        <!-- Footer -->
                        <div class="text-center mt-4 pt-3 border-top">
                            <p class="text-muted mb-0">
                                <small>© 2026 Escuela Técnica - Sistema de Boletas Digitales</small>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JavaScript personalizado -->
    <script src="js/auth.js"></script>
</body>
</html>
